
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.0/dist/alphaTab.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #ffffff; overflow: hidden; }
        #alphaTab { width: 100%; }
        .at-cursor-bar { background: red !important; width: 3px !important; z-index: 1000 !important; }
    </style>
</head>
<body>
    <div id="alphaTab"></div>
    <script>
        let api = null;
        const element = document.querySelector("#alphaTab");

        function signalReady() {
            if (window.Android && window.Android.onJsReady) {
                window.Android.onJsReady();
            } else {
                setTimeout(signalReady, 100);
            }
        }

        function initAlphaTab() {
            if (api) return;
            try {
                api = new alphaTab.AlphaTabApi(element, {
                    core: { engine: 'html5' },
                    display: { layoutMode: 'horizontal' },
                    player: {
                        enablePlayer: true,
                        enableCursor: true,
                        soundFont: "https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/soundfont/sonivox.sf2"
                    }
                });

                api.settings.display.cursor.mode = 1; // Beat mode
                api.updateSettings();

                api.scoreLoaded.on((score) => {
                    if (score.tracks.length > 0) {
                        const firstBeat = score.tracks[0].staves[0].bars[0].voices[0].beats[0];
                        analyze(firstBeat);
                    }
                });

                api.renderFinished.on(() => {
                    api.resize();
                });

                api.cursorPositionChanged.on((args) => {
                    if (args.beat) analyze(args.beat);
                });

                api.cursorChanged.on((args) => {
                    if (args.beat) analyze(args.beat);
                });
            } catch (e) {
                console.error("AlphaTab Init Error:", e);
            }
        }

        function analyze(beat) {
            if (!beat || !beat.notes) return;
            try {
                const analysis = {
                    barIndex: beat.voice.bar.index + 1,
                    leftHand: [],
                    rightHand: [],
                    instructions: ["Слідкуйте за червоним курсором"]
                };
                const strings = ['E','B','G','D','A','E'];
                beat.notes.forEach(n => {
                    let f = (n.fret % 4) + 1;
                    let sName = strings[n.string - 1] || n.string.toString();
                    analysis.leftHand.push({
                        finger: n.fret === 0 ? "0" : f.toString(),
                        fingerName: n.fret === 0 ? "Відкрита" : "Палець " + f,
                        string: sName,
                        fret: n.fret.toString(),
                        color: n.fret === 0 ? "#9E9E9E" : "#F57C00"
                    });
                    analysis.rightHand.push({
                        finger: n.string >= 4 ? "p" : "i",
                        fingerName: n.string >= 4 ? "Великий" : "Вказівний",
                        string: sName,
                        direction: n.string >= 4 ? "вниз" : "вгору",
                        color: n.string >= 4 ? "#795548" : "#2196F3"
                    });
                });
                if (window.Android && window.Android.postTabAnalysis) {
                    window.Android.postTabAnalysis(JSON.stringify(analysis));
                }
            } catch (e) { console.error("Analyze Error:", e); }
        }

        window.loadTab = (path) => {
            if (!api) initAlphaTab();
            if (api.player.state === 1) api.player.stop();
            api.load(path);
        };

        window.playPause = () => {
            if (api) {
                if (api.player.state !== 1) api.player.play();
                else api.player.pause();
            }
        };

        window.stopAudio = () => {
            if (api && api.player) api.player.stop();
        };

        // Починаємо ініціалізацію відразу
        initAlphaTab();
        signalReady();
    </script>
</body>
</html>
