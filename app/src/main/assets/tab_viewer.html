<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="alphatab_local.js"></script>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            --cursor-fill: #00A3FF;
            --cursor-stroke: #000000;
            --cursor-glow: rgba(0, 163, 255, 0.95);
            --cursor-bar: rgba(124, 77, 255, 0.28);
        }
        body.dark { 
            --cursor-fill: #FFD400;
            --cursor-stroke: #000000;
            --cursor-glow: rgba(255, 212, 0, 0.95);
            --cursor-bar: rgba(124, 77, 255, 0.35);
        }
        #alphaTabContainer {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: auto;
            padding: 0;
            box-sizing: border-box;
        }
        #alphaTab { 
            padding: 0; 
            box-sizing: border-box; 
            opacity: 1;
            transition: opacity 80ms linear;
        }
        body.restoring #alphaTab {
            opacity: 0;
        }
        #alphaTab svg, #alphaTab canvas { 
            width: 100% !important; 
            height: auto !important; 
            max-width: 100% !important;
            display: block;
            overflow: visible !important;
        }
        .at-cursor-beat { 
            background: var(--cursor-fill) !important; 
            fill: var(--cursor-fill) !important; 
            width: 10px !important; 
            stroke: var(--cursor-stroke) !important; 
            stroke-width: 3px !important;
            box-shadow: 0 0 10px var(--cursor-glow) !important; 
            z-index: 1000 !important; 
            opacity: 1 !important; /* Force visibility even on pause */
            visibility: visible !important;
            animation: none !important;
            transition: none !important;
            filter: drop-shadow(0 0 6px var(--cursor-glow)) !important;
        }
        .at-cursor-bar {
            background: var(--cursor-bar) !important;
            fill: var(--cursor-bar) !important;
            stroke: var(--cursor-fill) !important;
            stroke-width: 2px !important;
            opacity: 1 !important;
            visibility: visible !important;
        }
        body.restoring .at-cursor-beat,
        body.restoring .at-cursor-bar {
            opacity: 0 !important;
            visibility: hidden !important;
        }
        body.restoring .at-selection div {
            opacity: 0 !important;
            visibility: hidden !important;
        }
        .at-selection div { background: rgba(103, 80, 164, 0.3) !important; }
    </style>
</head>

function activeLocale() {
    return (_locale || 'uk').toLowerCase().startsWith('en') ? 'en' : 'uk';
}

function t(key, params = {}) {
    const table = I18N[activeLocale()] || I18N.uk;
    let value = table[key] || I18N.uk[key] || key;
    for (const [paramKey, paramValue] of Object.entries(params)) {
        value = value.replaceAll(`{${paramKey}}`, String(paramValue));
    }
    return value;
}

function leftHandName(finger) {
    const names = {
        1: t('lhIndex'),
        2: t('lhMiddle'),
        3: t('lhRing'),
        4: t('lhPinky')
    };
    return names[finger] || String(finger);
}

function rightHandName(symbol) {
    const names = {
        p: t('rhThumb'),
        i: t('rhIndex'),
        m: t('rhMiddle'),
        a: t('rhRing')
    };
    return names[symbol] || symbol;
}
const BIOMECH = {
    1:{1:8,2:1,3:2,4:4}, 2:{1:1,2:8,3:1,4:2},
    3:{1:3,2:1,3:8,4:1}, 4:{1:6,2:3,3:1,4:8}
};

const biomechCost = (f,t) => (BIOMECH[f]||{})[t]||5;
const transCost   = (p1,p2,d) => ((p2-p1)**2)/Math.max(d,.125);

// alphaTab string index in some files can be mirrored for 1/6.
// Normalize to UI convention: 1 = high e (top), 6 = low E (bottom).
function normalizeStringIndex(s){
    // Full mirror mapping:
    // 1<->6, 2<->5, 3<->4
    if(typeof s !== 'number') return s;
    if(s < 1 || s > 6) return s;
    return 7 - s;
}

function ensureBody(){
    if(!document.body){
        const body = document.getElementsByTagName('body')[0] || document.documentElement || document.createElement('body');
        document.body = body;
        if(document.documentElement && !body.parentNode){
            document.documentElement.appendChild(body);
        }
    }
    if(document.body && !document.body.addEventListener){
        document.body.addEventListener = function(){};
    }
}

function configCost(frets, pos) {
    const pr=frets.filter(f=>f>0); if(!pr.length)return 0;
    let c=0, span=Math.max(...pr)-Math.min(...pr);
    if(span>4)c+=(span-4)**2*3;
    for(const f of pr){const r=f-pos; if(r<0)c+=50; else if(r>4)c+=(r-4)**2*2;}
    return c;
}

function detectBarre(notes) {
    const pr=notes.filter(n=>n.fret>0); if(!pr.length)return null;
    const mn=Math.min(...pr.map(n=>n.fret)), on=pr.filter(n=>n.fret===mn);
    // Suggest barre only in clearly realistic cases: at least 3 notes on same fret.
    if(on.length>=3){
        const sortedStrings = on.map(n=>n.string).sort((a,b)=>a-b);
        const span = sortedStrings[sortedStrings.length - 1] - sortedStrings[0];
        const hasConsecutive = sortedStrings.some((s,i)=>i>0 && (s - sortedStrings[i-1])===1);
        if(span >= 2 && hasConsecutive) return mn;
    }
    return null;
}

function dpFingering(data) {
    if(!data.length)return[];
    const MAX=22;
    function cands(d){
        const pr=d.notes.filter(n=>n.fret>0).map(n=>n.fret);
        if(!pr.length)return Array.from({length:MAX},(_,i)=>i+1);
        const mn=Math.max(1,Math.min(...pr)),lo=Math.max(1,mn-3),hi=Math.min(MAX,mn+2);
        return Array.from({length:hi-lo+1},(_,i)=>lo+i);
    }
    let dp=new Map();
    for(const pos of cands(data[0]))dp.set(pos,{cost:configCost(data[0].notes.map(n=>n.fret),pos),prev:null,pos:pos});
    for(let i=1;i<data.length;i++){
        const d=data[i],fr=d.notes.map(n=>n.fret),pd=data[i-1].duration,nd=new Map();
        for(const pos of cands(d)){
            const cc=configCost(fr,pos);let bc=Infinity,bp=null;
            for(const[pp,{cost:pc}]of dp){const t=pc+transCost(pp,pos,pd)+cc;if(t<bc){bc=t;bp=dp.get(pp);}}
            nd.set(pos,{cost:bc,prev:bp,pos:pos});
        }
        dp=nd;
    }
    let best=null; for(const v of dp.values())if(!best||v.cost<best.cost)best=v;
    if(!best)return[];
    const path=[]; while(best){path.push(best.pos);best=best.prev;}
    return path.reverse();
}

function assignLhFingers(notes, pos, barre, prevF, prevBeatPlacement) {
    const sorted=[...notes].sort((a,b)=>(a.fret-b.fret)||(a.string-b.string)),lhMap={},newF={};

    for(const{string:s,fret:f,isDead}of sorted){
        if(f===0){lhMap[`${s}_${f}`]='-';continue;}
        if(f===barre && !isDead){lhMap[`${s}_${f}`]=`${leftHandName(1)} (${t('possibleBarre', { fret: f })})`;newF[s]=1;}
    }

    const toAssign = sorted.filter(n => n.fret > 0 && !n.isDead && !(barre !== null && n.fret === barre));
    if(!toAssign.length) return {lhMap,newF};

    function baseFinger(f){
        return Math.min(Math.max(f-pos+1,1),4);
    }
    function candSet(n){
        const b = baseFinger(n.fret);
        const out = [b, b-1, b+1, b-2, b+2].filter(v => v>=1 && v<=4);
        if(prevF[n.string] && !out.includes(prevF[n.string])) out.push(prevF[n.string]);
        return out;
    }
    function pairPenalty(a,b){
        let p = 0;
        if(a.finger === b.finger){
            // Same finger for two notes in one beat is generally undesirable.
            // Especially impossible on different frets at the same time.
            if(a.fret !== b.fret){
                p += 140;
            } else {
                p += (Math.abs(a.string - b.string) <= 1) ? 95 : 55;
            }
        }
        // Keep finger order mostly aligned with fret order.
        if(a.fret < b.fret && a.finger > b.finger) p += 8;
        if(a.fret > b.fret && a.finger < b.finger) p += 8;
        // For same-fret double-stops/chords, keep ergonomic order across strings:
        // lower-pitched string (bigger string index) should not use a higher finger
        // than the higher-pitched string on the same fret.
        if(a.fret === b.fret){
            if(a.string > b.string && a.finger > b.finger) p += 64;
            if(a.string < b.string && a.finger < b.finger) p += 64;
        }
        return p;
    }

    let bestCost = Infinity;
    let bestAssign = null;
    const current = [];

    function dfs(i, cost){
        if(cost >= bestCost) return;
        if(i >= toAssign.length){
            bestCost = cost;
            bestAssign = current.slice();
            return;
        }
        const n = toAssign[i];
        const b = baseFinger(n.fret);
        const candidates = candSet(n);
        for(const finger of candidates){
            let c = cost;
            c += Math.abs(finger - b) * 2.5;
            if(prevF[n.string]){
                c += Math.abs(finger - prevF[n.string]) * 2.0;
            }
            const prevSameString = prevBeatPlacement?.[n.string];
            if(prevSameString && prevSameString.fret === n.fret){
                // Same note on same string/fret between beats: keep the same finger.
                if(prevSameString.finger === finger) c -= 14;
                else c += 120;
            }
            const prevAdjacentLower = prevBeatPlacement?.[n.string + 1];
            const prevAdjacentUpper = prevBeatPlacement?.[n.string - 1];
            if(
                (prevAdjacentLower && prevAdjacentLower.fret === n.fret && prevAdjacentLower.finger === finger) ||
                (prevAdjacentUpper && prevAdjacentUpper.fret === n.fret && prevAdjacentUpper.finger === finger)
            ){
                c += 10;
            }
            for(const a of current){
                c += pairPenalty(a, {string:n.string, fret:n.fret, finger});
            }
            current.push({string:n.string, fret:n.fret, finger});
            dfs(i+1, c);
            current.pop();
        }
    }
    dfs(0, 0);

    for(const item of (bestAssign || [])){
        lhMap[`${item.string}_${item.fret}`]=leftHandName(item.finger);
        newF[item.string]=item.finger;
    }

    return{lhMap,newF};
}

class RightHandSM {
    constructor(){this._last='m';}
    getFingers(notes){
        const res={};
        const FULL={p:rightHandName('p'),i:rightHandName('i'),m:rightHandName('m'),a:rightHandName('a')};
        const ordered = [...notes].sort((a,b)=>a.string-b.string);
        if(ordered.length === 1){
            const s = ordered[0].string;
            if(s >= 5) return {[s]: FULL.p};
            const nx = this._last === 'm' ? 'i' : 'm';
            this._last = nx;
            return {[s]: FULL[nx]};
        }
        // For chords keep a practical classical pattern: bass with thumb, top voices with i/m/a.
        const topMap={1:'a',2:'m',3:'i'};
        let thumbUsed = false;
        for(const n of ordered){
            if(n.string >= 4 && !thumbUsed){
                res[n.string] = FULL.p;
                thumbUsed = true;
            }else if(n.string <= 3){
                res[n.string] = FULL[topMap[n.string] || 'i'];
            }else{
                res[n.string] = FULL.i;
            }
        }
        return res;
    }
}

// ── Strict Neutral Instructions ─────────────────────────

function buildInstructions(notes, rawNotes, lhMap, rhMap, barre, pos, isTapping) {
    const inst = [];

    if (isTapping) {
        inst.push(t('tappingInstruction'));
        return inst;
    }

    const noteCount = notes.length;

    if (barre !== null) {
        inst.push(t('positionBarre', { fret: barre }));
        inst.push(t('barreHelp'));
    } else if (pos > 0) {
        const pr = notes.filter(n=>n.fret>0 && !n.isDead);
        if(pr.length > 0) {
            const span = Math.max(...pr.map(n=>n.fret)) - Math.min(...pr.map(n=>n.fret));
            inst.push(t('positionAround', { fret: pos }));
            if (span > 3) inst.push(t('wideStretchInstruction'));
        }
    }

    if (noteCount === 1) {
        const {string:s, fret:f} = notes[0];
        const lh = lhMap[`${s}_${f}`]||'?';
        const rh = rhMap[s]||rightHandName('i');
        if(rawNotes[0].isDead) {
            inst.push(t('leftHandMuted', { string: STRING_NAMES[s] }));
        } else if (f === 0) {
            inst.push(t('leftHandOpen', { string: STRING_NAMES[s] }));
        } else {
            inst.push(t('leftHandFinger', { finger: lh, string: STRING_NAMES[s], fret: f }));
        }
        inst.push(t('rightHandFinger', { finger: rh, direction: s >= 4 ? t('directionDown') : t('directionUp') }));
    } else {
        inst.push(t('chord', { count: noteCount }));
        const lhParts = notes.map(n=>{
            if(n.isDead) return `${STRING_SHORT[n.string]}-${t('mutedShort')}`;
            return `${STRING_SHORT[n.string]}-${n.fret===0 ? t('openShort') : n.fret}(${lhMap[`${n.string}_${n.fret}`]||'?'})`;
        });
        inst.push(t('leftHandSummary', { items: lhParts.join(', ') }));
        if (notes.some(n=>n.string>=4) && notes.some(n=>n.string<=3)) {
            inst.push(t('rightHandArpeggio'));
        } else {
            const dir = notes[0].string>=4 ? t('directionDown') : t('directionUp');
            inst.push(t('rightHandStrum', { direction: dir }));
        }
    }

    let bend=false, vib=false, slIn=false, slOut=false, leg=false, pm=false, harm=false, trill=false;
    let ghost=false, dead=false, letR=false, slap=false, pop=false, acc=false;
    
    for(const n of rawNotes){
        if(n.hasBend) bend=true;
        if(n.vibrato) vib=true;
        if(n.slideIn) slIn=true;
        if(n.slideOut) slOut=true;
        if(n.isHammer) leg=true;
        if(n.isPalmMute) pm=true;
        if(n.hasHarmonic) harm=true;
        if(n.isTrill) trill=true;
        if(n.isGhost) ghost=true;
        if(n.isDead) dead=true;
        if(n.isLetRing) letR=true;
        if(n.isSlap) slap=true;
        if(n.isPop) pop=true;
        if(n.accent > 0) acc=true;
    }

    if (acc) inst.push(t('accentInstruction'));
    if (ghost) inst.push(t('ghostInstruction'));
    if (dead) inst.push(t('deadInstruction'));
    if (slap) inst.push(t('slapInstruction'));
    if (pop) inst.push(t('popInstruction'));
    if (letR) inst.push(t('letRingInstruction'));

    if (bend) inst.push(t('bendInstruction'));
    if (vib) inst.push(t('vibratoInstruction'));
    if (slIn || slOut) inst.push(t('slideInstruction'));
    if (leg) {
        inst.push(t('legatoInstruction'));
        inst.push(t('tieInstruction'));
    }
    if (pm) inst.push(t('palmMuteInstruction'));
    if (harm) inst.push(t('harmonicInstruction'));
    if (trill) inst.push(t('trillInstruction'));

    if (!inst.length) inst.push(t('plainNoteInstruction'));
    return inst;
}

function buildAnalysis(barIdx, notes, rawNotes, lhMap, rhMap, barre, pos, isTapping, nextData) {
    const LH=[], RH=[];
    for(let i=0; i<notes.length; i++) {
        const n = notes[i], rn = rawNotes[i];
        const s = n.string, f = n.fret, isDead = n.isDead;
        const sn=STRING_SHORT[s]||String(s);
        let lbl=lhMap[`${s}_${f}`]||'?';
        if(isDead) lbl = t('deadLabel');
        const open=f===0&&!isDead;
        LH.push({
             finger:open?'0':lbl.charAt(0), 
             fingerName:open?'Відкрита струна':lbl, 
             string:sn, stringIndex:s, fret:String(f), 
             color:open?'#4FC3F7':(isDead?'#757575':'#D07B30'),
             isDead: !!isDead,
             isHammer: !!rn.isHammer,
             isPullOff: !!rn.isPullOff,
             isSlide: !!rn.slideIn || !!rn.slideOut,
             isVibrato: !!rn.vibrato,
             isGhost: !!rn.isGhost,
             hasBend: !!rn.hasBend,
             isPalmMute: !!rn.isPalmMute,
             hasHarmonic: !!rn.hasHarmonic,
             isTrill: !!rn.isTrill,
             isLetRing: !!rn.isLetRing,
             isSlap: !!rn.isSlap,
             isPop: !!rn.isPop,
             isAccent: !!rn.accent,
             isTapping: !!isTapping
        });
        const rh=rhMap[s]||(s>=4 ? rightHandName('p') : rightHandName('i'));
        RH.push({finger:rh.charAt(0), fingerName:rh, string:sn, stringIndex:s, direction: rh.charAt(0), color: s>=4 ?'#8B6350':'#3678B5'});
    }
    
    let contextHint = null;
    let width = 0;
    const fretted = notes.filter(n=>n.fret>0);
    if (fretted.length > 0) {
       width = Math.max(...fretted.map(n=>n.fret)) - Math.min(...fretted.map(n=>n.fret));
    }
    
    if (rawNotes.some(r => r.hasHarmonic)) contextHint = t('techniqueHarmonic');
    else if (rawNotes.some(r => r.isDead)) contextHint = t('techniqueDead');
    else if (rawNotes.some(r => r.hasBend)) contextHint = t('techniqueBend');
    else if (rawNotes.some(r => r.isPalmMute)) contextHint = t('techniquePalmMute');
    else if (rawNotes.some(r => r.isTrill)) contextHint = t('techniqueTrill');
    else if (rawNotes.some(r => r.isGhost)) contextHint = t('techniqueGhost');
    else if (rawNotes.some(r => r.isLetRing)) contextHint = t('techniqueLetRing');
    else if (isTapping) contextHint = t('techniqueTapping');
    else if (rawNotes.some(r => r.isSlap)) contextHint = t('techniqueSlap');
    else if (rawNotes.some(r => r.isPop)) contextHint = t('techniquePop');
    else if (rawNotes.some(r => r.isHammer || r.isPullOff)) contextHint = t('techniqueLegato');
    else if (rawNotes.some(r => r.slideIn || r.slideOut)) contextHint = t('techniqueSlide');
    else if (rawNotes.some(r => r.vibrato)) contextHint = t('techniqueVibrato');
    else if (barre !== null) contextHint = t('possibleBarre', { fret: barre });
    else if (width > 3) contextHint = t('wideStretch');

    const nextLH = [];
    if (nextData && nextData.notes) {
        for(const n of nextData.notes) {
            nextLH.push({
                finger: 'ghost', fingerName: '', string: STRING_SHORT[n.string]||String(n.string),
                fret: String(n.fret), color: '#FFFFFF', isDead: !!n.isDead, isGhost: true, isHammer: false, isPullOff: false, isSlide: false, isVibrato: false
            });
        }
    }

    const instructions = buildInstructions(notes, rawNotes, lhMap, rhMap, barre, pos, isTapping);
    return {barIndex:barIdx+1, leftHand:LH, rightHand:RH, instructions, barreFret: barre, contextHint: contextHint, nextLeftHand: nextLH};
}

// ── Two-level beat cache ─────────────────────────────────
const beatMap = new Map();  
const tickArr = [];         
let _selectedTrackIndex = 0;
let _transposeSemitones = 0;

function beatKey(beat){try{return`${beat.voice.bar.index}_${beat.index}`;}catch{return null;}}

function getActiveTrack(score) {
    if (!score?.tracks?.length) return null;
    return score.tracks.find(t => t.index === _selectedTrackIndex)
        || api?.tracks?.[0]
        || score.tracks.find(t => !t.isPercussionTrack)
        || score.tracks[0];
}

function runFullAnalysis(score) {
    beatMap.clear(); tickArr.length=0;
    try {
        const track=getActiveTrack(score);
        if(!track?.staves?.length)return;
        const data=[];
        for(const bar of track.staves[0].bars){
            for(const voice of bar.voices){
                if(voice.isEmpty)continue;
                for(const beat of voice.beats){
                    const notes=beat.notes.filter(n=>n.fret!=null);
                    if(!notes.length)continue;
                    const durVal=typeof beat.duration==='object'?beat.duration.value:beat.duration;
                    data.push({
                        beat,barIdx:bar.index,
                        duration:DUR_BEATS[durVal]??1,
                        notes:notes.map(n=>({string:normalizeStringIndex(n.string), fret:n.fret, isDead:!!n.isDead})),
                        rawNotes:notes.map(n=>({
                            hasBend:    !!n.hasBend,
                            vibrato:    !!(n.vibrato&&n.vibrato!==0),
                            slideIn:    !!(n.slideInType&&n.slideInType!==0),
                            slideOut:   !!(n.slideOutType&&n.slideOutType!==0),
                            isHammer:   !!n.isHammerPullOrigin,
                            isPullOff:  !!n.isLeftHandTapped,
                            isPalmMute: !!(n.isPalmMute||n.effect?.palmMute),
                            hasHarmonic:!!(n.harmonicType&&n.harmonicType!==0),
                            isTrill:    !!n.isTrill,
                            isGhost:    !!n.isGhost,
                            isDead:     !!n.isDead,
                            isLetRing:  !!(n.isLetRing || n.effect?.letRing),
                            isSlap:     !!n.isSlap,
                            isPop:      !!n.isPop,
                            accent:     n.accentValue || 0
                        })),
                        isTapping:!!(beat.isTapping||beat.effect?.isTapping),
                        isTiedBeat: notes.every(n=>n.isTiedNote)
                    });
                }
            }
        }
        if(!data.length)return;
        const attackData = data.filter(d=>!d.isTiedBeat);
        const positions=dpFingering(attackData);
        const rhSM=new RightHandSM();
        
        let prevLhF={}, prevBeatPlacement={}, atkIdx=0, firstJson=null;
        for(let i=0;i<data.length;i++){
            const{beat,barIdx,notes,rawNotes,isTapping,isTiedBeat}=data[i];
            
            let pos=1, barre=null, lhMap={}, newF={}, rhMap={};
            if(isTiedBeat && atkIdx>0) {
            } else {
                pos=positions[atkIdx]||1; barre=detectBarre(notes);
                const a = assignLhFingers(notes,pos,barre,prevLhF,prevBeatPlacement);
                lhMap = a.lhMap; newF = a.newF; rhMap=rhSM.getFingers(notes);
                prevLhF=newF;
                const placement = {};
                for(const n of notes){
                    if(n.fret > 0 && !n.isDead){
                        const key = `${n.string}_${n.fret}`;
                        const fingerName = lhMap[key] || '';
                        const fingerNum = parseInt(fingerName, 10);
                        if(Number.isFinite(fingerNum)){
                            placement[n.string] = {fret:n.fret, finger:fingerNum};
                        }
                    }
                }
                prevBeatPlacement = placement;
                atkIdx++;
            }

            let nextData = null;
            for(let j=i+1; j<data.length; j++) {
                if(!data[j].isTiedBeat) {
                    nextData = data[j];
                    break;
                }
            }

            const json=JSON.stringify(buildAnalysis(barIdx,notes,rawNotes,lhMap,rhMap,barre,pos,isTapping,nextData));
            const key=beatKey(beat); if(key)beatMap.set(key,json);
            tickArr.push({tick:beat.start??beat.absoluteDisplayStart??(i*960),json});
            if(!firstJson && !isTiedBeat)firstJson=json;
        }
        tickArr.sort((a,b)=>a.tick-b.tick);
        if(firstJson)postToAndroid(firstJson);

        // Build a compact text representation for AI token optimization
        let compactTabs = "";
        for(const bar of track.staves[0].bars){
            compactTabs += "Measure " + (bar.index + 1) + ":\n";
            for(const voice of bar.voices){
                if(voice.isEmpty)continue;
                let eventNum = 1;
                for(const beat of voice.beats){
                    const notes=beat.notes.filter(n=>n.fret!=null);
                    if(!notes.length) { eventNum++; continue; }
                    let beatStr = "Event " + eventNum + " inside this measure: [";
                    for(let i = notes.length - 1; i >= 0; i--) {
                        let n = notes[i];
                        let stringLabel = STRING_NAMES[n.string] || String(n.string);
                        beatStr += t('stringLabel', { string: n.string, label: stringLabel, fret: n.fret });
                        if (i > 0) beatStr += ", ";
                    }
                    beatStr += "]";
                    compactTabs += beatStr + "\n";
                    eventNum++;
                }
            }
        }
        if(window.Android?.postCompactTabs) window.Android.postCompactTabs(compactTabs);

    }catch(e){console.error('runFullAnalysis:',e);}
}

function postToAndroid(json){if(json&&window.Android?.postTabAnalysis)window.Android.postTabAnalysis(json);}

function sendForTick(t){
    if(!tickArr.length)return;
    let lo=0,hi=tickArr.length-1,best=-1;
    while(lo<=hi){const mid=(lo+hi)>>1;if(tickArr[mid].tick<=t){best=mid;lo=mid+1;}else hi=mid-1;}
    if(best>=0)postToAndroid(tickArr[best].json);
}

function sendForBeat(beat){
    if(!beat)return;
    const key=beatKey(beat);
    if(key&&beatMap.has(key)){postToAndroid(beatMap.get(key));return;}
    const t=beat.start??beat.absoluteDisplayStart;
    if(t!=null)sendForTick(t);
}

        if (!startMasterBar) return;
        
        let endTick = 0;
        const nextBar = api.score.masterBars[endMeasure]; // The bar AFTER the end piece
        if (nextBar) {
            endTick = nextBar.start - 1;
        } else if (endMasterBar) {
            endTick = endMasterBar.start + 999999;
        }

        api.playbackRange = { startTick: startMasterBar.start, endTick: endTick };
        // If the player is active, move playhead back to start of loop if it's currently outside
        if (api.tickPosition < startMasterBar.start || api.tickPosition > endTick) {
            api.tickPosition = startMasterBar.start;
        }
    } else {
        api.playbackRange = null;
    }
};

let api=null, _poll=null, _lastTick=-1, _pendingScale=null, _scoreLoadedFired=false, _pendingSoundFontBase64=null, _pendingTabBase64=null, _pendingTabPath=null, _initRetry=null, _restoreTick=null, _restoreBarIndex=null, _restorePlay=false, _restoreAttempts=0, _restoreToken=0, _restoreTimers=[], _initialCursorSet=false, _tickReportTimer=null;
let _metronomeEnabled=false, _metronomeBpm=90, _metronomeTimer=null, _metronomeCtx=null;
let _silentMode=false;
let _restoreLock=false;

function signalReady(){
    window.__tabViewerReady = true;
    if(window.Android?.onJsReady)window.Android.onJsReady();else setTimeout(signalReady,100);
}
function stopMetronome(){
    if(_metronomeTimer!=null){
        clearInterval(_metronomeTimer);
        _metronomeTimer = null;
    }
}

function ensureMetronomeContext(){
    if(!_metronomeCtx){
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if(!Ctx) return false;
        _metronomeCtx = new Ctx();
    }
    if(_metronomeCtx.state === 'suspended'){
        _metronomeCtx.resume();
    }
    return true;
}

function playMetronomeClick(){
    if(!ensureMetronomeContext()) return;
    const now = _metronomeCtx.currentTime;
    const osc = _metronomeCtx.createOscillator();
    const gain = _metronomeCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = 1600;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.18, now + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
    osc.connect(gain);
    gain.connect(_metronomeCtx.destination);
    osc.start(now);
    osc.stop(now + 0.055);
}

function restartMetronome(){
    stopMetronome();
    if(!_metronomeEnabled) return;
    const intervalMs = Math.max(80, Math.round(60000 / _metronomeBpm));
    playMetronomeClick();
    _metronomeTimer = setInterval(playMetronomeClick, intervalMs);
}
function postStatus(msg){
    console.log('AlphaTabStatus:' + msg);
    if(window.Android?.onAlphaTabStatus)window.Android.onAlphaTabStatus(msg);
}

function startPoller(){stopPoller();_lastTick=-1;_poll=setInterval(()=>{if(!api)return;try{const t=api.tickPosition;if(t==null||t===_lastTick)return;_lastTick=t;sendForTick(t);}catch{stopPoller();}},100);}
function stopPoller(){if(_poll!=null){clearInterval(_poll);_poll=null;}}

function getBarIndexForTick(tick){
    if(!api?.score?.masterBars || api.score.masterBars.length === 0) return null;
    let idx = 0;
    for(let i=0;i<api.score.masterBars.length;i++){
        const bar = api.score.masterBars[i];
        if(bar.start <= tick){
            idx = i;
        } else {
            break;
        }
    }
    return idx + 1;
}

function clearRestoreTimers(){
    if(!_restoreTimers || _restoreTimers.length === 0) return;
    _restoreTimers.forEach(id => { try{ clearTimeout(id); }catch{} });
    _restoreTimers = [];
}

function scheduleRestore(fn, delay){
    const id = setTimeout(() => {
        _restoreTimers = _restoreTimers.filter(t => t !== id);
        fn();
    }, delay);
    _restoreTimers.push(id);
    return id;
}

function ensureCursorInView(){
    try{
        const container = document.getElementById('alphaTabContainer');
        if(!container) return;
        if(typeof api?.scrollToCursor === 'function'){
            try{ api.scrollToCursor(); }catch{}
        }
        const cursorEl =
            document.querySelector('.at-cursor-bar') ||
            document.querySelector('.at-cursor-beat');
        if(!cursorEl) return;
        const cRect = container.getBoundingClientRect();
        const r = cursorEl.getBoundingClientRect();
        const margin = Math.max(32, Math.floor(cRect.height * 0.18));
        const isAbove = r.top < cRect.top + margin;
        const isBelow = r.bottom > cRect.bottom - margin;
        if(isAbove || isBelow){
            const target = (r.top + r.bottom) / 2 - (cRect.top + cRect.height / 2);
            container.scrollTop += target;
        }
    }catch{}
}

function normalizeScoreLoudness(score){
    if(!api || !score?.tracks || score.tracks.length === 0) return;
    const trackVolumes = score.tracks
        .map(track => track?.playbackInfo?.volume)
        .filter(volume => typeof volume === 'number');
    if(trackVolumes.length === 0) return;

    const maxVolume = Math.max(...trackVolumes);
    const targetMaxVolume = 15;
    const boost = Math.max(0, targetMaxVolume - maxVolume);
    if(boost > 0){
        score.tracks.forEach(track => {
            if(!track?.playbackInfo) return;
            const current = typeof track.playbackInfo.volume === 'number'
                ? track.playbackInfo.volume
                : targetMaxVolume;
            track.playbackInfo.volume = Math.min(targetMaxVolume, current + boost);
        });
    }

    // keep global output stable between files and honor silent mode
    api.masterVolume = _silentMode ? 0.0 : 1.0;
}

function detectScoreTempo(score){
    try{
        const firstBar = score?.masterBars && score.masterBars.length > 0 ? score.masterBars[0] : null;
        const direct = firstBar?.tempo;
        if(typeof direct === 'number' && Number.isFinite(direct)) return Math.round(direct);
        const automationVal = firstBar?.tempoAutomation?.value;
        if(typeof automationVal === 'number' && Number.isFinite(automationVal)) return Math.round(automationVal);
        const scoreTempo = score?.tempo;
        if(typeof scoreTempo === 'number' && Number.isFinite(scoreTempo)) return Math.round(scoreTempo);
    }catch{}
    return 90;
}

function applyRestore(){
    if(!api || !api.score) return;
    const token = _restoreToken;
    let targetTick = _restoreTick;
    if(_restoreBarIndex != null && _restoreBarIndex > 0 && api.score.masterBars && api.score.masterBars.length >= _restoreBarIndex){
        const bar = api.score.masterBars[_restoreBarIndex - 1];
        if(bar && bar.start != null){
            targetTick = bar.start;
        }
    }
    if(targetTick != null){
        const requestedBar = _restoreBarIndex ?? -1;
        postStatus(`restore:apply start tick=${targetTick} requestedBar=${requestedBar} play=${_restorePlay} attempt=${_restoreAttempts + 1}`);
        _initialCursorSet = true;
        try{ api.tickPosition = targetTick; }catch{}
        // alphaTab layout can settle a bit later; perform a few delayed scroll sync attempts
        ensureCursorInView();
        scheduleRestore(() => { if(token === _restoreToken) ensureCursorInView(); }, 60);
        scheduleRestore(() => { if(token === _restoreToken) ensureCursorInView(); }, 180);
        const verifyApplied = () => {
            if(token !== _restoreToken) return;
            let currentTick = 0;
            let currentBar = 0;
            try{
                currentTick = api.tickPosition ?? 0;
                currentBar = getBarIndexForTick(currentTick) ?? 0;
            }catch{}
            const reached = requestedBar > 1
                ? (currentBar > 0 && Math.abs(currentBar - requestedBar) <= 1)
                : currentTick > 0;
            postStatus(`restore:verify tick=${currentTick} currentBar=${currentBar} requestedBar=${requestedBar} reached=${reached} attempt=${_restoreAttempts + 1}`);
            if(reached){
                ensureCursorInView();
                scheduleRestore(() => { if(token === _restoreToken) ensureCursorInView(); }, 50);
                scheduleRestore(() => {
                    if(token !== _restoreToken) return;
                    try{
                        const appliedTick = api.tickPosition ?? 0;
                        const appliedBar = getBarIndexForTick(appliedTick) ?? 0;
                        postStatus(`restore:applied tick=${appliedTick} currentBar=${appliedBar} requestedBar=${requestedBar}`);
                        if(window.Android?.onRestoreApplied){
                            window.Android.onRestoreApplied(appliedTick, appliedBar, requestedBar);
                        }
                    }catch{}
                    if(_restorePlay){
                        tryResumeAudio();
                        try{ api.play(); }catch{}
                    }
                    _restoreTick = null;
                    _restoreBarIndex = null;
                    _restorePlay = false;
                    _restoreAttempts = 0;
                    clearRestoreTimers();
                    postStatus('restore:apply end');
                }, 120);
                return;
            }
            _restoreAttempts += 1;
            if(_restoreAttempts < 8){
                scheduleRestore(() => {
                    if(token === _restoreToken){
                        applyRestore();
                    }
                }, 220);
            }else{
                postStatus('restore:verify failed max attempts');
                _restoreTick = null;
                _restoreBarIndex = null;
                _restorePlay = false;
                _restoreAttempts = 0;
                clearRestoreTimers();
                postStatus('restore:apply end');
            }
        };
        scheduleRestore(verifyApplied, 220);
    }
}

window.setRestorePlayback=(tick, isPlaying, barIndex)=>{
    postStatus(`restore:set tick=${tick} bar=${barIndex} play=${isPlaying}`);
    clearRestoreTimers();
    _restoreToken += 1;
    _restoreTick = tick;
    _restorePlay = isPlaying;
    _restoreBarIndex = (barIndex != null && barIndex > 0) ? barIndex : null;

function initAlphaTab(){
    if(api)return;
    try{
        postStatus('init');
        if(!window.alphaTab || !window.alphaTab.AlphaTabApi){
            postStatus('noAlphaTab');
            if(!_initRetry){
                _initRetry = setTimeout(()=>{ _initRetry=null; initAlphaTab(); }, 120);
            }
            return;
        }
        ensureBody();
        postStatus('creatingApi');
        api=new alphaTab.AlphaTabApi(document.querySelector('#alphaTab'),{
            core:{
                engine:'svg',
                scriptFile:'https://appassets.androidplatform.net/assets/alphatab_local.js',
                fontDirectory:'https://appassets.androidplatform.net/assets/alphatab_font/',
                useWorkers:false
            },
            display:{
                layoutMode: 0,
                staveProfile: 'Tab',
                padding: [4, 64, 4, 8]
            },
            player:{
                enablePlayer:true,
                enableCursor:true,
                enableAnimatedBeatCursor:true,
                cursorMode:1,
                scrollElement: document.querySelector('#alphaTabContainer'),
                scrollOffsetX: 0,
                scrollOffsetY: 0,
                scrollMode: alphaTab.ScrollMode.OffScreen,
                outputMode: 1
            }
        });
        api.settings.player.enableCursor = true;
        api.settings.player.enableAnimatedBeatCursor = true;
        api.updateSettings();
        postStatus('apiReady');
        if(_pendingSoundFontBase64){
            const bytes = base64ToUint8Array(_pendingSoundFontBase64);
            api.loadSoundFont(bytes, false);
            _pendingSoundFontBase64 = null;
            postStatus('soundFontLoad:queued');
        }
        if(_pendingTabBase64){
            const bytes = base64ToUint8Array(_pendingTabBase64);
            _pendingTabBase64 = null;
            api.load(bytes);
            postStatus('tabLoad:queued');
        } else if (_pendingTabPath){
            const path = _pendingTabPath;
            _pendingTabPath = null;
            api.load(path.startsWith('/')?'file://'+path:path);
            postStatus('tabLoad:queued');
        }
        api.playerReady.on(()=>{
            postStatus('playerReady');
            if(_pendingSoundFontBase64){
                const bytes = base64ToUint8Array(_pendingSoundFontBase64);
                api.loadSoundFont(bytes, false);
                _pendingSoundFontBase64 = null;
                postStatus('soundFontLoad:queued');
            }
        });
        api.soundFontLoaded.on(()=>{ postStatus('soundFontLoaded'); });
        if(api.soundFontLoadFailed){
            api.soundFontLoadFailed.on(()=>{ postStatus('soundFontLoadFailed'); });
        }
        api.playerStateChanged.on(args=>{ postStatus('playerState:'+args?.state); });
        api.scoreLoaded.on(score=>{
            normalizeScoreLoudness(score);
            const detectedTempo = detectScoreTempo(score);
            _metronomeBpm = Math.max(40, Math.min(240, detectedTempo));
            if(window.Android?.onDetectedTempo){
                window.Android.onDetectedTempo(_metronomeBpm);
            }
            setTimeout(() => runFullAnalysis(score), 400); // give UI time to animate fade-in
            if(_pendingScale != null){
                api.settings.display.scale = _pendingScale;
                api.updateSettings();
            }
            api.settings.player.enableCursor = true;
            api.settings.player.enableAnimatedBeatCursor = true;
            api.updateSettings();
        });
        api.renderFinished.on(()=>{
            _scoreLoadedFired = true;
            if(window.Android?.onScoreLoaded) {
                const totalMeasures = api.score && api.score.masterBars ? api.score.masterBars.length : 0;
                window.Android.onScoreLoaded(totalMeasures);
            }
            if(_restoreTick != null){
                applyRestore();
            }
            api.settings.player.enableCursor = true;
            api.settings.player.enableAnimatedBeatCursor = true;
            api.updateSettings();
        });
        api.playerPositionChanged.on(args=>{
            if(args?.currentBeat) sendForBeat(args.currentBeat);
            try{
                let barIndex = args?.currentBeat?.voice?.bar?.index;
                if(barIndex != null) barIndex = barIndex + 1;
                if(barIndex == null){
                    barIndex = getBarIndexForTick(api.tickPosition ?? 0);
                }
                if(window.Android?.onPlaybackProgress && barIndex != null){
                    window.Android.onPlaybackProgress(api.tickPosition ?? 0, api.playerState === 1, barIndex);
                } else if(window.Android?.onTickPosition){
                    window.Android.onTickPosition(api.tickPosition ?? 0, api.playerState === 1);
                }
            }catch{}
        });
        api.playerStateChanged.on(args=>{
            if(args?.state===1)startPoller();else stopPoller();
            try{
                if(window.Android?.onTickPosition){
                    window.Android.onTickPosition(api.tickPosition ?? 0, api.playerState === 1);
                }
            }catch{}
        });
        if(_tickReportTimer==null){
            _tickReportTimer = setInterval(() => {
                try{
                    if(!api) return;
                    const tick = api.tickPosition ?? 0;
                    const barIndex = getBarIndexForTick(tick);
                    if(window.Android?.onPlaybackProgress && barIndex != null){
                        window.Android.onPlaybackProgress(tick, api.playerState === 1, barIndex);
                    } else if(window.Android?.onTickPosition){
                        window.Android.onTickPosition(tick, api.playerState === 1);
                    }
                }catch{}
            }, 500);
        }
        api.beatMouseDown.on(beat=>{
            if(!beat)return;
            sendForBeat(beat);
            try{
                const t=beat.start??beat.absoluteDisplayStart;
                if(t!=null)api.tickPosition=t;
            }catch{}
        });
        api.error.on(e=>{
            postStatus('error');
            _scoreLoadedFired = true;
            if(window.Android?.onScoreLoaded) {
                window.Android.onScoreLoaded(0);
            }
        });
    }catch(e){
        postStatus('initError:' + (e?.message || 'unknown'));
        console.error('AlphaTab init:',e);
    }
    
    // Force cursor visibility and thickness even when alphaTab attempts to hide it (e.g. on pause)
    setInterval(() => {
        const cursors = document.querySelectorAll('.at-cursor-beat');
        cursors.forEach(c => {
            c.style.setProperty('display', 'block', 'important');
            c.style.setProperty('visibility', 'visible', 'important');
            c.style.setProperty('opacity', '1', 'important');
            c.style.setProperty('fill', 'var(--cursor-fill)', 'important');
            c.style.setProperty('stroke', 'var(--cursor-stroke)', 'important');
            c.style.setProperty('stroke-width', '3px', 'important');
            if(c.tagName && c.tagName.toLowerCase() === 'rect') {
                 c.setAttribute('width', '12');
                 c.setAttribute('rx', '2');
            }
        });
    }, 100);
}

function base64ToUint8Array(base64){
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++){
        bytes[i]=binary.charCodeAt(i);
    }
    return bytes;
}

function ensureApi(){
    if(!api) initAlphaTab();
    return !!api;
}

window.loadSoundFontFromBase64=(base64)=>{
    if(!ensureApi()){
        postStatus('apiNotReady');
        _pendingSoundFontBase64 = base64;
        return;
    }
    if(!api?.player){
        _pendingSoundFontBase64 = base64;
        postStatus('soundFontLoad:pending');
        return;
    }
    const bytes = base64ToUint8Array(base64);
    api.loadSoundFont(bytes, false);
};

window.loadTab=(path)=>{
    if(!ensureApi()){
        postStatus('apiNotReady');
        _pendingTabPath = path;
        return;
    }
    _scoreLoadedFired = false;
    api.load(path.startsWith('/')?'file://'+path:path);
};
window.loadTabFromBase64=(base64)=>{
    if(!ensureApi()){
        postStatus('apiNotReady');
        _pendingTabBase64 = base64;
        return;
    }
    _scoreLoadedFired = false;
    const bytes = base64ToUint8Array(base64);
    api.load(bytes);
};
function tryResumeAudio(){
    try{
        const output = api?.player?.output;
        if(output?.activate){ output.activate(); }
        const ctx = output?._context;
        if(ctx && (ctx.state === 'suspended' || ctx.state === 'interrupted')) {
            ctx.resume();
        }
    }catch(e){}
}
window.playPause=()=>{if(api){tryResumeAudio();api.playPause();}};
window.stopAudio=()=>{if(api){api.stop();stopPoller();} stopMetronome();};
window.setPlaybackSpeed=(s)=>{if(api)api.playbackSpeed=parseFloat(s);};
window.setRestoreLock=(locked)=>{
    _restoreLock = !!locked;
    document.body.classList.toggle('restoring', _restoreLock);
    postStatus('restore:lock=' + _restoreLock);
};
window.setSilentMode=(enabled)=>{
    _silentMode = !!enabled;
    if(api){
        api.masterVolume = _silentMode ? 0.0 : 1.0;
    }
    postStatus('silentMode=' + _silentMode);
};
window.setMetronomeEnabled=(enabled)=>{
    _metronomeEnabled = !!enabled;
    restartMetronome();
    postStatus('metronome:enabled=' + _metronomeEnabled);
};
window.setMetronomeBpm=(bpm)=>{
    const parsed = parseInt(bpm, 10);
    _metronomeBpm = Number.isFinite(parsed) ? Math.max(40, Math.min(240, parsed)) : 90;
    if(_metronomeEnabled){
        restartMetronome();
    }
    postStatus('metronome:bpm=' + _metronomeBpm);
};
window.getTrackOptions=()=>{
    if(!api?.score?.tracks?.length) return JSON.stringify([]);
    const selected = getActiveTrack(api.score)?.index ?? _selectedTrackIndex;
    return JSON.stringify(api.score.tracks.map((track, i) => ({
        index: track.index ?? i,
        name: (track.name || track.shortName || `Track ${i + 1}`).trim(),
        selected: (track.index ?? i) === selected
    })));
};
window.applyLearningTools=(trackIndex, transposeSemitones)=>{
    if(!api?.score?.tracks?.length) return false;
    const parsedTrackIndex = parseInt(trackIndex, 10);
    const parsedTranspose = parseInt(transposeSemitones, 10);
    const nextTrackIndex = Number.isFinite(parsedTrackIndex) ? parsedTrackIndex : 0;
    const nextTranspose = Number.isFinite(parsedTranspose) ? Math.max(-36, Math.min(36, parsedTranspose)) : 0;
    const track = api.score.tracks.find(t => t.index === nextTrackIndex) || api.score.tracks[0];
    if(!track) return false;

    _selectedTrackIndex = track.index ?? nextTrackIndex;
    _transposeSemitones = nextTranspose;

    const trackCount = api.score.tracks.length;
    const pitches = new Array(trackCount).fill(0);
    if(_selectedTrackIndex >= 0 && _selectedTrackIndex < trackCount) {
        pitches[_selectedTrackIndex] = _transposeSemitones;
    }

    const wasPlaying = api.playerState === 1;
    const tick = api.tickPosition ?? 0;
    if(_restoreTick == null && _restoreBarIndex == null){
        _restoreTick = tick;
        _restorePlay = wasPlaying;
        _restoreBarIndex = getBarIndexForTick(tick);
    }

    api.settings.notation.transpositionPitches = pitches;
    api.settings.notation.displayTranspositionPitches = pitches.slice();
    api.updateSettings();
    api.renderTracks([track]);
    runFullAnalysis(api.score);
    postStatus(`learningTools:track=${_selectedTrackIndex}:transpose=${_transposeSemitones}`);
    return true;
};
window.setTabScale=(s)=>{
    _pendingScale = parseFloat(s);
    if(!api) return;
    if(_restoreLock){
        api.settings.display.scale = _pendingScale;
        api.updateSettings();
        return;
    }
    if(!api.score){
        api.settings.display.scale = _pendingScale;
        api.updateSettings();
        return;
    }
    const wasPlaying = api.playerState === 1;
    const tick = api.tickPosition ?? 0;
    // Do not overwrite an external restore request (from Android) that is still pending.
    if(_restoreTick == null && _restoreBarIndex == null){
        _restoreTick = tick;
        _restorePlay = wasPlaying;
        _restoreBarIndex = getBarIndexForTick(tick);
    }
    api.settings.display.scale = _pendingScale;
    api.updateSettings();
    if(api.score){
        api.render();
    }
};

window.setTabDisplayMode=(mode)=>{
    if(!api) return;
    if(_restoreLock){
        if (window.alphaTab && window.alphaTab.StaveProfile) {
            api.settings.display.staveProfile = window.alphaTab.StaveProfile[mode] ?? api.settings.display.staveProfile;
        } else {
            api.settings.display.staveProfile = mode;
        }
        api.updateSettings();
        return;
    }
    if(!api.score){
        if (window.alphaTab && window.alphaTab.StaveProfile) {
            api.settings.display.staveProfile = window.alphaTab.StaveProfile[mode] ?? api.settings.display.staveProfile;
        } else {
            api.settings.display.staveProfile = mode;
        }
        api.updateSettings();
        return;
    }
    const wasPlaying = api.playerState === 1;
    const tick = api.tickPosition ?? 0;
    // Do not overwrite an external restore request (from Android) that is still pending.
    if(_restoreTick == null && _restoreBarIndex == null){
        _restoreTick = tick;
        _restorePlay = wasPlaying;
        _restoreBarIndex = getBarIndexForTick(tick);
    }
    if (window.alphaTab && window.alphaTab.StaveProfile) {
        api.settings.display.staveProfile = window.alphaTab.StaveProfile[mode] ?? api.settings.display.staveProfile;
    } else {
        api.settings.display.staveProfile = mode;
    }
    api.updateSettings();
    if(api.score){
        api.render();
    }
};

initAlphaTab();
signalReady();
</script>
</body>
</html>
