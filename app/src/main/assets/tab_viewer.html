<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.0/dist/alphaTab.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #alphaTab { 
            padding: 0 16px; 
            box-sizing: border-box; 
        }
        .at-cursor-beat { 
            background: rgba(255, 0, 0, 1) !important; 
            fill: rgba(255, 0, 0, 1) !important; 
            width: 6px !important; 
            stroke: rgba(255, 0, 0, 1) !important; 
            stroke-width: 2px !important;
            box-shadow: 0 0 8px rgba(255, 0, 0, 1) !important; 
            z-index: 1000 !important; 
            opacity: 1 !important; /* Force visibility even on pause */
            visibility: visible !important;
            animation: none !important;
            transition: none !important;
        }
        .at-cursor-bar {
            background: rgba(103, 80, 164, 0.2) !important; /* Subtle purple tint for active measure */
        }
        .at-selection div { background: rgba(103, 80, 164, 0.3) !important; }
    </style>
</head>
<body>
    <div id="alphaTab"></div>
<script>
// ══════════════════════════════════════════════════════════
//  AlgorithmicTutor v6.6 — JavaScript port
//  DP + Biomechanics + Expanded Techniques + Contextual Speed
// ══════════════════════════════════════════════════════════

const STRING_NAMES = {1:'e (1)',2:'b (2)',3:'g (3)',4:'d (4)',5:'A (5)',6:'E (6)'};
const STRING_SHORT = {1:'e',2:'b',3:'g',4:'d',5:'A',6:'E'};
const LH_NAMES     = {1:'1 (вказівний)',2:'2 (середній)',3:'3 (безіменний)',4:'4 (мізинець)'};
const DUR_BEATS    = {1:4,2:2,4:1,8:.5,16:.25,32:.125,64:.0625};
const BIOMECH = {
    1:{1:8,2:1,3:2,4:4}, 2:{1:1,2:8,3:1,4:2},
    3:{1:3,2:1,3:8,4:1}, 4:{1:6,2:3,3:1,4:8}
};

const biomechCost = (f,t) => (BIOMECH[f]||{})[t]||5;
const transCost   = (p1,p2,d) => ((p2-p1)**2)/Math.max(d,.125);

function configCost(frets, pos) {
    const pr=frets.filter(f=>f>0); if(!pr.length)return 0;
    let c=0, span=Math.max(...pr)-Math.min(...pr);
    if(span>4)c+=(span-4)**2*3;
    for(const f of pr){const r=f-pos; if(r<0)c+=50; else if(r>4)c+=(r-4)**2*2;}
    return c;
}

function detectBarre(notes) {
    const pr=notes.filter(n=>n.fret>0); if(!pr.length)return null;
    const mn=Math.min(...pr.map(n=>n.fret)), on=pr.filter(n=>n.fret===mn);
    if(on.length>=3)return mn;
    if(on.length===2){const s=on.map(n=>n.string); if(Math.max(...s)-Math.min(...s)>=2)return mn;}
    return null;
}

function dpFingering(data) {
    if(!data.length)return[];
    const MAX=22;
    function cands(d){
        const pr=d.notes.filter(n=>n.fret>0).map(n=>n.fret);
        if(!pr.length)return Array.from({length:MAX},(_,i)=>i+1);
        const mn=Math.max(1,Math.min(...pr)),lo=Math.max(1,mn-3),hi=Math.min(MAX,mn+2);
        return Array.from({length:hi-lo+1},(_,i)=>lo+i);
    }
    let dp=new Map();
    for(const pos of cands(data[0]))dp.set(pos,{cost:configCost(data[0].notes.map(n=>n.fret),pos),path:[pos]});
    for(let i=1;i<data.length;i++){
        const d=data[i],fr=d.notes.map(n=>n.fret),pd=data[i-1].duration,nd=new Map();
        for(const pos of cands(d)){
            const cc=configCost(fr,pos);let bc=Infinity,bp=null;
            for(const[pp,{cost:pc,path:pp2}]of dp){const t=pc+transCost(pp,pos,pd)+cc;if(t<bc){bc=t;bp=[...pp2,pos];}}
            nd.set(pos,{cost:bc,path:bp||[]});
        }
        dp=nd;
    }
    let best=null; for(const v of dp.values())if(!best||v.cost<best.cost)best=v;
    return best?best.path:[];
}

function assignLhFingers(notes, pos, barre, prevF) {
    const sorted=[...notes].sort((a,b)=>b.string-a.string),used=new Set(),lhMap={},newF={};
    if(barre!==null)used.add(1);
    for(const{string:s,fret:f,isDead}of sorted){
        if(f===0){lhMap[`${s}_${f}`]='-';continue;}
        if(f===barre && !isDead){lhMap[`${s}_${f}`]='1 (баре)';newF[s]=1;continue;}
        const ideal=Math.min(Math.max(f-pos+1,1),4);
        let bf=null,bc=Infinity;
        for(let i=1;i<=4;i++){
            if(used.has(i))continue;
            const tc=Math.abs(i-ideal)*2+(prevF[s]?biomechCost(prevF[s],i):0);
            if(tc<bc){bc=tc;bf=i;}
        }
        if(!bf)bf=ideal; used.add(bf); newF[s]=bf;
        lhMap[`${s}_${f}`]=LH_NAMES[bf]||String(bf);
    }
    return{lhMap,newF};
}

class RightHandSM {
    constructor(){this._last='m';}
    getFingers(notes){
        const res={};
        const FULL={p:'p (великий)',i:'i (вказівний)',m:'m (середній)',a:'a (безіменний)'};
        const ARG={1:'a',2:'m',3:'i'};
        const mel=notes.filter(n=>n.string<=3),bas=notes.filter(n=>n.string>=4);
        for(const{string:s}of bas)res[s]=FULL.p;
        if(!mel.length)return res;
        if(notes.length>1&&bas.length>0){
            for(const{string:s}of mel)res[s]=FULL[ARG[s]||'i'];
            this._last='m';
        } else {
            for(const{string:s}of[...mel].sort((a,b)=>b.string-a.string)){
                const nx=this._last==='m'?'i':'m'; res[s]=FULL[nx]; this._last=nx;
            }
        }
        return res;
    }
}

// ── Strict Neutral Instructions ─────────────────────────

function buildInstructions(notes, rawNotes, lhMap, rhMap, barre, pos, isTapping) {
    const inst = [];

    if (isTapping) {
        inst.push('Теппінг: Нота виконується ударом пальця правої руки безпосередньо по ладу на грифі.');
        return inst;
    }

    const noteCount = notes.length;

    if (barre !== null) {
        inst.push(`Позиція: Баре на ${barre}-му ладі.`);
        inst.push('Вказівний палець розміщується поперек струн, інші пальці додаються за схемою.');
    } else if (pos > 0) {
        const pr = notes.filter(n=>n.fret>0 && !n.isDead);
        if(pr.length > 0) {
            const span = Math.max(...pr.map(n=>n.fret)) - Math.min(...pr.map(n=>n.fret));
            inst.push(`Позиція: Навколо ${pos}-го ладу.`);
            if (span > 3) inst.push('Широка розтяжка: Великий палець лівої руки слід опустити ближче до центру грифа для полегшення позиції.');
        }
    }

    if (noteCount === 1) {
        const {string:s, fret:f} = notes[0];
        const lh = lhMap[`${s}_${f}`]||'?';
        const rh = rhMap[s]||'i (вказівний)';
        if(rawNotes[0].isDead) {
            inst.push(`Ліва рука: Заглушена нота на струні ${STRING_NAMES[s]}. Пальці торкаються струни без притискання.`);
        } else if (f === 0) {
            inst.push(`Ліва рука: Відкрита струна ${STRING_NAMES[s]}.`);
        } else {
            inst.push(`Ліва рука: Палець ${lh} на струні ${STRING_NAMES[s]}, лад ${f}.`);
        }
        inst.push(`Права рука: Палець ${rh}, напрямок удару — ${s>=4 ? 'вниз' : 'вгору'}.`);
    } else {
        inst.push(`Акорд: Одночасне звучання ${noteCount} струн.`);
        const lhParts = notes.map(n=>{
            if(n.isDead) return `${STRING_SHORT[n.string]}-глуха`;
            return `${STRING_SHORT[n.string]}-${n.fret===0?'відкр.':n.fret}(${lhMap[`${n.string}_${n.fret}`]||'?'})`;
        });
        inst.push(`Ліва рука: ${lhParts.join(', ')}.`);
        if (notes.some(n=>n.string>=4) && notes.some(n=>n.string<=3)) {
            inst.push('Права рука: Виконується перебором (арпеджіо).');
        } else {
            const dir = notes[0].string>=4 ? 'вниз' : 'вгору';
            inst.push(`Права рука: Удар по всім струнам (страм) ${dir}.`);
        }
    }

    let bend=false, vib=false, slIn=false, slOut=false, leg=false, pm=false, harm=false, trill=false;
    let ghost=false, dead=false, letR=false, slap=false, pop=false, acc=false;
    
    for(const n of rawNotes){
        if(n.hasBend) bend=true;
        if(n.vibrato) vib=true;
        if(n.slideIn) slIn=true;
        if(n.slideOut) slOut=true;
        if(n.isHammer) leg=true;
        if(n.isPalmMute) pm=true;
        if(n.hasHarmonic) harm=true;
        if(n.isTrill) trill=true;
        if(n.isGhost) ghost=true;
        if(n.isDead) dead=true;
        if(n.isLetRing) letR=true;
        if(n.isSlap) slap=true;
        if(n.isPop) pop=true;
        if(n.accent > 0) acc=true;
    }

    if (acc) inst.push('Акцент: Ця нота виконується з підвищеною динамікою (гучніше).');
    if (ghost) inst.push('Нота-привид (Ghost): Виконується дуже тихо, ледь відчутно, створюючи фонову пульсацію.');
    if (dead) inst.push('Мертва нота (Dead Note): Струна повністю приглушена лівою рукою; удар правої руки генерує перкусійний звук.');
    if (slap) inst.push('Слеп (Slap): Виконується різким ударом суглоба великого пальця правої руки по басовій струні.');
    if (pop) inst.push('Поп (Pop): Струна підчіплюється вказівним пальцем правої руки і різко відпускається, створюючи характерний ляскіт.');
    if (letR) inst.push('Let Ring: Нота залишається звучати; струну не слід глушити під час переходу до наступних нот.');

    if (bend) inst.push('Підтяжка (Bend): Після удару по струні підтягніть її пальцями лівої руки для досягнення потрібної висоти тону.');
    if (vib) inst.push('Вібрато: Виконується ритмічним розгойдуванням притиснутого пальця для коливання висоти тону.');
    if (slIn || slOut) inst.push('Слайд (Glissando): Палець ковзає по струні до потрібного ладу без повторного удару медіатором.');
    if (leg) inst.push('Легато (Hammer-on/Pull-off): Наступна нота береться без удару правої руки (ударом пальця лівої руки по грифу або зривом струни).');
    if (pm) inst.push('Palm Mute (Глушіння долонею): Ребро правої долоні злегка торкається струн біля підставки, приглушуючи їх резонанс.');
    if (harm) inst.push('Флажолет (Harmonics): Палець лівої руки злегка торкається струни рівно над порожком (без притискання), генеруючи обертон.');
    if (trill) inst.push('Трель: Швидке безперервне чергування двох нот методом Hammer-on та Pull-off.');

    if (!inst.length) inst.push('Звичайна нота без додаткових артикуляцій.');
    return inst;
}

function buildAnalysis(barIdx, notes, rawNotes, lhMap, rhMap, barre, pos, isTapping, nextData) {
    const LH=[], RH=[];
    for(let i=0; i<notes.length; i++) {
        const n = notes[i], rn = rawNotes[i];
        const s = n.string, f = n.fret, isDead = n.isDead;
        const sn=STRING_SHORT[s]||String(s);
        let lbl=lhMap[`${s}_${f}`]||'?';
        if(isDead) lbl = 'Глуха (x)';
        const open=f===0&&!isDead;
        LH.push({
             finger:open?'0':lbl.charAt(0), 
             fingerName:open?'Відкрита струна':lbl, 
             string:sn, fret:isDead?'x':String(f), 
             color:open?'#9E9E9E':(isDead?'#757575':'#D07B30'),
             isHammer: !!rn.isHammer,
             isPullOff: false,
             isSlide: !!rn.slideIn || !!rn.slideOut,
             isVibrato: !!rn.vibrato,
             isGhost: !!rn.isGhost
        });
        const rh=rhMap[s]||(s>=4 ? 'p (великий)' : 'i (вказівний)');
        RH.push({finger:rh.charAt(0), fingerName:rh, string:sn, direction: rh.charAt(0), color: s>=4 ?'#8B6350':'#3678B5'});
    }
    
    let contextHint = null;
    let width = 0;
    const fretted = notes.filter(n=>n.fret>0);
    if (fretted.length > 0) {
       width = Math.max(...fretted.map(n=>n.fret)) - Math.min(...fretted.map(n=>n.fret));
    }
    
    if (barre !== null) contextHint = "Баре на " + barre + " ладі";
    else if (width > 3) contextHint = "Широка розтяжка!";
    else if (rawNotes.some(r => r.isSlap)) contextHint = "Слеп!";
    else if (rawNotes.some(r => r.isHammer)) contextHint = "Легато (Hammer-on)";
    else if (rawNotes.some(r => r.slideIn || r.slideOut)) contextHint = "Слайд";
    else if (rawNotes.some(r => r.vibrato)) contextHint = "Вібрато";

    const nextLH = [];
    if (nextData && nextData.notes) {
        for(const n of nextData.notes) {
            nextLH.push({
                finger: 'ghost', fingerName: '', string: STRING_SHORT[n.string]||String(n.string),
                fret: String(n.fret), color: '#FFFFFF', isGhost: true, isHammer: false, isPullOff: false, isSlide: false, isVibrato: false
            });
        }
    }

    const instructions = buildInstructions(notes, rawNotes, lhMap, rhMap, barre, pos, isTapping);
    return {barIndex:barIdx+1, leftHand:LH, rightHand:RH, instructions, barreFret: barre, contextHint: contextHint, nextLeftHand: nextLH};
}

// ── Two-level beat cache ─────────────────────────────────
const beatMap = new Map();  
const tickArr = [];         

function beatKey(beat){try{return`${beat.voice.bar.index}_${beat.index}`;}catch{return null;}}

function runFullAnalysis(score) {
    beatMap.clear(); tickArr.length=0;
    try {
        const track=score.tracks.find(t=>!t.isPercussionTrack)||score.tracks[0];
        if(!track?.staves?.length)return;
        const data=[];
        for(const bar of track.staves[0].bars){
            for(const voice of bar.voices){
                if(voice.isEmpty)continue;
                for(const beat of voice.beats){
                    const notes=beat.notes.filter(n=>n.fret!=null);
                    if(!notes.length)continue;
                    const durVal=typeof beat.duration==='object'?beat.duration.value:beat.duration;
                    data.push({
                        beat,barIdx:bar.index,
                        duration:DUR_BEATS[durVal]??1,
                        notes:notes.map(n=>({string:n.string, fret:n.fret, isDead:!!n.isDead})),
                        rawNotes:notes.map(n=>({
                            hasBend:    !!n.hasBend,
                            vibrato:    !!(n.vibrato&&n.vibrato!==0),
                            slideIn:    !!(n.slideInType&&n.slideInType!==0),
                            slideOut:   !!(n.slideOutType&&n.slideOutType!==0),
                            isHammer:   !!n.isHammerPullOrigin,
                            isPalmMute: !!(n.isPalmMute||n.effect?.palmMute),
                            hasHarmonic:!!(n.harmonicType&&n.harmonicType!==0),
                            isTrill:    !!n.isTrill,
                            isGhost:    !!n.isGhost,
                            isDead:     !!n.isDead,
                            isLetRing:  !!(n.isLetRing || n.effect?.letRing),
                            isSlap:     !!n.isSlap,
                            isPop:      !!n.isPop,
                            accent:     n.accentValue || 0
                        })),
                        isTapping:!!(beat.isTapping||beat.effect?.isTapping),
                        isTiedBeat: notes.every(n=>n.isTiedNote)
                    });
                }
            }
        }
        if(!data.length)return;
        const attackData = data.filter(d=>!d.isTiedBeat);
        const positions=dpFingering(attackData);
        const rhSM=new RightHandSM();
        
        let prevLhF={}, atkIdx=0, firstJson=null;
        for(let i=0;i<data.length;i++){
            const{beat,barIdx,notes,rawNotes,isTapping,isTiedBeat}=data[i];
            
            let pos=1, barre=null, lhMap={}, newF={}, rhMap={};
            if(isTiedBeat && atkIdx>0) {
            } else {
                pos=positions[atkIdx]||1; barre=detectBarre(notes);
                const a = assignLhFingers(notes,pos,barre,prevLhF);
                lhMap = a.lhMap; newF = a.newF; rhMap=rhSM.getFingers(notes);
                prevLhF=newF;
                atkIdx++;
            }

            let nextData = null;
            for(let j=i+1; j<data.length; j++) {
                if(!data[j].isTiedBeat) {
                    nextData = data[j];
                    break;
                }
            }

            const json=JSON.stringify(buildAnalysis(barIdx,notes,rawNotes,lhMap,rhMap,barre,pos,isTapping,nextData));
            const key=beatKey(beat); if(key)beatMap.set(key,json);
            tickArr.push({tick:beat.start??beat.absoluteDisplayStart??(i*960),json});
            if(!firstJson && !isTiedBeat)firstJson=json;
        }
        tickArr.sort((a,b)=>a.tick-b.tick);
        if(firstJson)postToAndroid(firstJson);

        // Build a compact text representation for AI token optimization
        let compactTabs = "";
        for(const bar of track.staves[0].bars){
            compactTabs += "Measure " + (bar.index + 1) + ":\n";
            for(const voice of bar.voices){
                if(voice.isEmpty)continue;
                let beatNum = 1;
                for(const beat of voice.beats){
                    const notes=beat.notes.filter(n=>n.fret!=null);
                    if(!notes.length) { beatNum++; continue; }
                    let beatStr = "Beat " + beatNum + ": [";
                    for(let i = notes.length - 1; i >= 0; i--) {
                        let n = notes[i];
                        let stringLabel = STRING_NAMES[n.string] || String(n.string);
                        beatStr += "Струна " + n.string + " [" + stringLabel + "] (лад " + n.fret + ")";
                        if (i > 0) beatStr += ", ";
                    }
                    beatStr += "]";
                    compactTabs += beatStr + "\n";
                    beatNum++;
                }
            }
        }
        if(window.Android?.postCompactTabs) window.Android.postCompactTabs(compactTabs);

    }catch(e){console.error('runFullAnalysis:',e);}
}

function postToAndroid(json){if(json&&window.Android?.postTabAnalysis)window.Android.postTabAnalysis(json);}

function sendForTick(t){
    if(!tickArr.length)return;
    let lo=0,hi=tickArr.length-1,best=-1;
    while(lo<=hi){const mid=(lo+hi)>>1;if(tickArr[mid].tick<=t){best=mid;lo=mid+1;}else hi=mid-1;}
    if(best>=0)postToAndroid(tickArr[best].json);
}

function sendForBeat(beat){
    if(!beat)return;
    const key=beatKey(beat);
    if(key&&beatMap.has(key)){postToAndroid(beatMap.get(key));return;}
    const t=beat.start??beat.absoluteDisplayStart;
    if(t!=null)sendForTick(t);
}

// ── Dark-mode: invert only canvas, not container ─────────
let _isDark=false;

function applyCanvasTheme(){
    document.querySelectorAll('#alphaTab canvas, #alphaTab svg').forEach(c=>{
        c.style.filter = _isDark ? 'invert(1) brightness(0.88)' : 'none';
    });
}
const canvasObs = new MutationObserver(() => {
    applyCanvasTheme();
});
canvasObs.observe(document.getElementById('alphaTab'), {childList:true, subtree:true});

window.setTheme = (isDark) => {
    _isDark = isDark;
    document.body.classList.toggle('dark', isDark);
    document.documentElement.classList.toggle('dark', isDark);
    applyCanvasTheme();
};

window.setPracticeModeSpeed = (isPractice) => {
    if(!api) return;
    // Practice mode defaults to 0.5x
    api.playbackSpeed = isPractice ? 0.5 : 1.0;
};

window.setPracticeModeLayout = (isPractice) => {
    if(!api) return;
    const isHorizontal = isPractice;
    api.settings.display.layoutMode = isHorizontal ? 1 : 0;
    api.settings.player.scrollOffsetX = -50;
    api.settings.player.scrollOffsetY = -150;
    api.updateSettings();
};

window.setLoopRange = (startMeasure, endMeasure, isLooping) => {
    if(!api || !api.score) return;
    api.isLooping = isLooping;
    if (isLooping && startMeasure > 0 && endMeasure > 0) {
        const startMasterBar = api.score.masterBars[startMeasure - 1];
        const endMasterBar = api.score.masterBars[endMeasure - 1];
        if (!startMasterBar) return;
        
        let endTick = 0;
        const nextBar = api.score.masterBars[endMeasure]; // The bar AFTER the end piece
        if (nextBar) {
            endTick = nextBar.start - 1;
        } else if (endMasterBar) {
            endTick = endMasterBar.start + 999999;
        }

        api.playbackRange = { startTick: startMasterBar.start, endTick: endTick };
        // If the player is active, move playhead back to start of loop if it's currently outside
        if (api.tickPosition < startMasterBar.start || api.tickPosition > endTick) {
            api.tickPosition = startMasterBar.start;
        }
    } else {
        api.playbackRange = null;
    }
};

// ── AlphaTab setup ───────────────────────────────────────
let api=null, _poll=null, _lastTick=-1;

function signalReady(){if(window.Android?.onJsReady)window.Android.onJsReady();else setTimeout(signalReady,100);}
function startPoller(){stopPoller();_lastTick=-1;_poll=setInterval(()=>{if(!api)return;try{const t=api.tickPosition;if(t==null||t===_lastTick)return;_lastTick=t;sendForTick(t);}catch{stopPoller();}},100);}
function stopPoller(){if(_poll!=null){clearInterval(_poll);_poll=null;}}

function initAlphaTab(){
    if(api)return;
    try{
        api=new alphaTab.AlphaTabApi(document.querySelector('#alphaTab'),{
            core:{engine:'svg'},
            display:{
                layoutMode: 0, 
                staveProfile: 'Tab',
                padding: [0, 80, 0, 0] // [left, top, right, bottom]
            },
            player:{
                enablePlayer:true,
                enableCursor:true,
                cursorMode:1,
                scrollElement: window,
                scrollOffsetX: -50,
                scrollOffsetY: -150,
                soundFont:'https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/soundfont/sonivox.sf2'
            }
        });
        api.scoreLoaded.on(score=>{
            setTimeout(() => runFullAnalysis(score), 400); // give UI time to animate fade-in
        });
        api.renderFinished.on(()=>{
            if(window.Android?.onScoreLoaded) {
                const totalMeasures = api.score && api.score.masterBars ? api.score.masterBars.length : 0;
                window.Android.onScoreLoaded(totalMeasures);
            }
        });
        api.playerPositionChanged.on(args=>{if(args?.currentBeat)sendForBeat(args.currentBeat);});
        api.playerStateChanged.on(args=>{if(args?.state===1)startPoller();else stopPoller();});
        api.beatMouseDown.on(beat=>{
            if(!beat)return;
            sendForBeat(beat);
            try{
                const t=beat.start??beat.absoluteDisplayStart;
                if(t!=null)api.tickPosition=t;
            }catch{}
        });
    }catch(e){console.error('AlphaTab init:',e);}
    
    // Force cursor visibility and thickness even when alphaTab attempts to hide it (e.g. on pause)
    setInterval(() => {
        const cursors = document.querySelectorAll('.at-cursor-beat');
        cursors.forEach(c => {
            c.style.setProperty('display', 'block', 'important');
            c.style.setProperty('visibility', 'visible', 'important');
            c.style.setProperty('opacity', '1', 'important');
            c.style.setProperty('fill', 'rgba(255, 0, 0, 1)', 'important');
            c.style.setProperty('stroke', 'rgba(255, 0, 0, 1)', 'important');
            c.style.setProperty('stroke-width', '4px', 'important');
            if(c.tagName && c.tagName.toLowerCase() === 'rect') {
                 c.setAttribute('width', '10');
                 c.setAttribute('rx', '2'); // slight rounding
            }
        });
    }, 100);
}

window.loadTab=(path)=>{if(!api)initAlphaTab();api.load(path.startsWith('/')?'file://'+path:path);};
window.playPause=()=>{if(api)api.playPause();};
window.stopAudio=()=>{if(api){api.stop();stopPoller();}};
window.setPlaybackSpeed=(s)=>{if(api)api.playbackSpeed=parseFloat(s);};

initAlphaTab();
signalReady();
</script>
</body>
</html>
