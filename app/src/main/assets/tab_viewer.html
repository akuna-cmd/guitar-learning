<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="alphatab_local.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            --cursor-fill: #00A3FF;
            --cursor-stroke: #000000;
            --cursor-glow: rgba(0, 163, 255, 0.95);
            --cursor-bar: rgba(124, 77, 255, 0.28);
        }
        body.dark {
            --cursor-fill: #FFD400;
            --cursor-stroke: #000000;
            --cursor-glow: rgba(255, 212, 0, 0.95);
            --cursor-bar: rgba(124, 77, 255, 0.35);
        }
        #alphaTabContainer {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: auto;
            padding: 0;
            box-sizing: border-box;
        }
        #alphaTab {
            padding: 0;
            box-sizing: border-box;
            opacity: 1;
            transition: opacity 80ms linear;
        }
        body.restoring #alphaTab {
            opacity: 0;
        }
        #alphaTab svg, #alphaTab canvas {
            width: 100% !important;
            height: auto !important;
            max-width: 100% !important;
            display: block;
            overflow: visible !important;
        }
        .at-cursor-beat {
            background: var(--cursor-fill) !important;
            fill: var(--cursor-fill) !important;
            width: 10px !important;
            stroke: var(--cursor-stroke) !important;
            stroke-width: 3px !important;
            box-shadow: 0 0 10px var(--cursor-glow) !important;
            z-index: 1000 !important;
            opacity: 1 !important;
            visibility: visible !important;
            animation: none !important;
            transition: none !important;
            filter: drop-shadow(0 0 6px var(--cursor-glow)) !important;
        }
        .at-cursor-bar {
            background: var(--cursor-bar) !important;
            fill: var(--cursor-bar) !important;
            stroke: var(--cursor-fill) !important;
            stroke-width: 2px !important;
            opacity: 1 !important;
            visibility: visible !important;
        }
        body.restoring .at-cursor-beat,
        body.restoring .at-cursor-bar {
            opacity: 0 !important;
            visibility: hidden !important;
        }
        body.restoring .at-selection div {
            opacity: 0 !important;
            visibility: hidden !important;
        }
        .at-selection div {
            background: rgba(103, 80, 164, 0.3) !important;
        }
    </style>
</head>
<body>
    <div id="alphaTabContainer">
        <div id="alphaTab"></div>
    </div>
    <script src="tab_viewer_i18n.js"></script>
    <script src="tab_viewer_analysis.js"></script>
    <script src="tab_viewer_bridge.js"></script>
</body>
</html>
